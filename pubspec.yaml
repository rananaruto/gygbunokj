name: snaptube
description: SnapTube - YouTube Video & Shorts Downloader. Fast, modern, production-ready.
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Advanced Engine (Merging 4K/8K, GIF, Compression)
  ffmpeg_kit_flutter: 4.5.1-LTS

  # Database for Queue & Vault
  sqflite: ^2.3.2
  path: ^1.9.0

  # Metadata & Formatting
  intl: ^0.19.0
  
  # Icons & UI
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0

  # YouTube engine — fetch video info, stream manifests
  youtube_explode_dart: ^2.3.4

  # State management (GetX)
  get: ^4.6.6

  # Storage & file paths
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3

  # Permissions: storage, notifications
  permission_handler: ^11.3.0

  # UI
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0

  # Receive YouTube links shared from browser / YT app
  receive_sharing_intent: ^1.8.0

  # Network check
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
